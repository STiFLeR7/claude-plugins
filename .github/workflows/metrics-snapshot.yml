name: metrics-snapshot

on:
  schedule:
    # GitHub traffic API retains 14 days; snapshot weekly.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snapshot marketplace traffic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p metrics
          STAMP=$(date -u +%Y-%m-%d)
          gh api repos/${{ github.repository }}/traffic/clones    > "metrics/clones-${STAMP}.json"
          gh api repos/${{ github.repository }}/traffic/views     > "metrics/views-${STAMP}.json"
          gh api repos/${{ github.repository }}/traffic/popular/referrers > "metrics/referrers-${STAMP}.json"
          gh api repos/${{ github.repository }}/traffic/popular/paths     > "metrics/paths-${STAMP}.json"

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore(metrics): weekly snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
